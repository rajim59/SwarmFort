name: Nightly Security Scan

on:
  # NOTE FOR PRODUCTION:
  # Uncomment the schedule block below to enable automatic daily backups.
  # Currently commented out to save GitHub Actions free tier limits (1000 mins),
  # as the Azure servers are kept stopped during the development phase.
  #
  # schedule:
  #   - cron: '0 2 * * *'   # Runs daily at 3:00 AM

  workflow_dispatch:        # Allows manual execution from GitHub UI      # টেস্টিংয়ের জন্য ম্যানুয়াল ট্রিগার

jobs:
  nightly-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Trivy full scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'rajim59/swarmfort-api:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
        env:
          # ডকার হাবের রেট লিমিট বা প্রাইভেট ইমেজের জন্য ক্রেডেনশিয়াল
          TRIVY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan
          path: trivy-results.sarif

      # নতুন সংযোজন: Docker Bench Security দিয়ে রানটাইম এবং হোস্ট অডিট
      - name: Run Docker Bench Security
        run: |
          chmod +x infra/security/docker-bench-security.sh
          ./infra/security/docker-bench-security.sh > docker-bench-report.txt 2>&1 || true

      # নতুন সংযোজন: অডিট রিপোর্টটি গিটহাবে আর্টিফ্যাক্ট হিসেবে সেভ করা
      - name: Upload Docker Bench report
        uses: actions/upload-artifact@v4
        with:
          name: docker-bench-report
          path: docker-bench-report.txt
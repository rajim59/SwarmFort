name: CI Pipeline

on:
  pull_request:
    branches: [main]
  workflow_dispatch:        # টেস্টিংয়ের জন্য ম্যানুয়াল ট্রিগার

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      # Node.js 24 সাপোর্টেড লেটেস্ট ভার্সন
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # নতুন সংযোজন: Hadolint দিয়ে Dockerfile-এর বেস্ট প্র্যাকটিস স্ক্যান
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/docker/Dockerfile.prod

      # সঠিক পাথ এবং ইউজারনেম দিয়ে বিল্ড করা (Buildx --load সহ লোকাল স্ক্যানের জন্য)
      - name: Build image for local testing
        run: |
          docker buildx build --platform linux/amd64 \
            --load \
            -t rajim59/swarmfort-api:pr-test \
            -f infra/docker/Dockerfile.prod .

      # Trivy স্ক্যান - শুধুমাত্র HIGH এবং CRITICAL পেলে বিল্ড ফেইল করাবে (exit-code: 1)
      - name: Run Trivy scan (HIGH/CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rajim59/swarmfort-api:pr-test
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      # SBOM (Software Bill of Materials) জেনারেট করা
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: rajim59/swarmfort-api:pr-test
          format: spdx-json
          output-file: sbom.spdx.json

      # সিকিউরিটি অডিটের জন্য SBOM ফাইলটি গিটহাবে সেভ করা
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      # নতুন সংযোজন: Container Structure Test (ইমেজের ভেতরের কনফিগারেশন চেক)
      - name: Container Structure Test
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/infra/tests:/tests \
            gcr.io/gcp-runtimes/container-structure-test:latest test \
            --image rajim59/swarmfort-api:pr-test \
            --config /tests/container-structure-tests.yml

  # নতুন সংযোজন: OPA/Conftest জব (পলিসি অ্যাজ কোড ভেরিফিকেশন)
  opa-conftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      # Official OPA container দিয়ে Dockerfile স্ক্যান
      - name: Run Conftest for Dockerfile
        run: docker run --rm -v $(pwd):/workspace openpolicyagent/conftest test /workspace/infra/docker/Dockerfile.prod -p /workspace/infra/security/opa-policies/image-policy.rego
      
      # Official OPA container দিয়ে Docker Stack (YAML) স্ক্যান
      - name: Run Conftest for stack file
        run: docker run --rm -v $(pwd):/workspace openpolicyagent/conftest test /workspace/infra/docker/docker-stack.yml -p /workspace/infra/security/opa-policies/runtime-policy.rego
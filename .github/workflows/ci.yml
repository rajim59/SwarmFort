name: CI Pipeline

on:
  pull_request:
    branches: [main]
  workflow_dispatch:        # টেস্টিংয়ের জন্য ম্যানুয়াল ট্রিগার

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      # Node.js 24 সাপোর্টেড লেটেস্ট ভার্সন
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # সঠিক পাথ এবং ইউজারনেম দিয়ে বিল্ড করা
      - name: Build image
        run: docker build -t rajim59/swarmfort-api:pr-test -f infra/docker/Dockerfile.prod .

      # Trivy স্ক্যান - শুধুমাত্র HIGH এবং CRITICAL পেলে বিল্ড ফেইল করাবে (exit-code: 1)
      - name: Run Trivy scan (HIGH/CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rajim59/swarmfort-api:pr-test
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      # SBOM (Software Bill of Materials) জেনারেট করা
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: rajim59/swarmfort-api:pr-test
          format: spdx-json
          output-file: sbom.spdx.json

      # সিকিউরিটি অডিটের জন্য SBOM ফাইলটি গিটহাবে সেভ করা
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
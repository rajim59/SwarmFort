name: Automated Swarm Backup

on:
  # NOTE FOR PRODUCTION:
  # Uncomment the schedule block below to enable automatic daily backups.
  # Currently commented out to save GitHub Actions free tier limits (1000 mins),
  # as the Azure servers are kept stopped during the development phase.
  #
  # schedule:
  #   - cron: '0 3 * * *'   # Runs daily at 3:00 AM

  workflow_dispatch:        # Allows manual execution from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run backup on manager
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SWARM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # ১. গিটহাব থেকে ব্যাকআপ স্ক্রিপ্টটি ম্যানেজার সার্ভারে পাঠানো হচ্ছে
          scp -o StrictHostKeyChecking=no infra/swarm-scripts/backup-swarm.sh azureuser@${{ secrets.MANAGER_IP }}:/home/azureuser/backup-swarm.sh
          
          # ২. স্ক্রিপ্টটিকে এক্সিকিউটেবল পারমিশন দিয়ে SUDO সহ রান করা হচ্ছে
          ssh -o StrictHostKeyChecking=no azureuser@${{ secrets.MANAGER_IP }} \
            "chmod +x /home/azureuser/backup-swarm.sh && sudo bash /home/azureuser/backup-swarm.sh"
            
      - name: Upload backup to artifact (if local)
        run: |
          # ব্যাকআপ ফাইলটি যেন scp দিয়ে আনা যায়, সেজন্য প্রসেসটি হ্যান্ডেল করা হচ্ছে
          scp -o StrictHostKeyChecking=no azureuser@${{ secrets.MANAGER_IP }}:/backups/swarm/*.tar.gz.gpg . || echo "Check permissions if fallback occurs"
name: Release (Sign & SLSA)

on:
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      # Node.js 24 সাপোর্টেড লেটেস্ট ভার্সনগুলো ব্যবহার করা হলো
      - name: Checkout code
        uses: actions/checkout@v5  

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4  

      - name: Login to Docker Hub
        uses: docker/login-action@v4  
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build multi-arch image and push
        id: build
        uses: docker/build-push-action@v6  
        with:
          context: .
          file: infra/docker/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: rajim59/swarmfort-api:latest

      - name: Sign with Cosign
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes rajim59/swarmfort-api:latest@${{ steps.build.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}

  generate-provenance:
    needs: build-and-sign
    permissions:
      actions: read
      id-token: write
      contents: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: rajim59/swarmfort-api
      digest: ${{ needs.build-and-sign.outputs.digest }}
name: Release (Sign & Deploy)

on:
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4  

      - name: Login to Docker Hub
        uses: docker/login-action@v4  
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build multi-arch image and push
        id: build
        uses: docker/build-push-action@v6  
        with:
          context: .
          file: infra/docker/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: rajim59/swarmfort-api:latest

      - name: Sign with Cosign
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes rajim59/swarmfort-api:latest@${{ steps.build.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: DCT Sign
        run: |
          export DOCKER_CONTENT_TRUST=1
          docker trust sign rajim59/swarmfort-api:latest || echo "DCT signing skipped"
        env:
          DOCKER_CONTENT_TRUST_REPOSITORY_PASSPHRASE: ${{ secrets.DCT_PASSPHRASE }}

  generate-provenance:
    needs: build-and-sign
    permissions:
      actions: read
      id-token: write
      contents: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: rajim59/swarmfort-api
      digest: ${{ needs.build-and-sign.outputs.digest }}
    secrets:
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy-to-swarm:
    needs: [build-and-sign, generate-provenance]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Deploy to Azure Swarm (Single Pipe Stream)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SWARM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # SCP বাদ দিয়ে সরাসরি SSH-এর মাধ্যমে মেমোরি স্ট্রিম করে ফাইল পাঠানো এবং ডেপ্লয় করা
          tar -czf - infra/ | ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes azureuser@${{ secrets.MANAGER_IP }} \
            "cd /tmp && tar -xzf - && cd infra/docker && docker stack deploy -c docker-stack.yml swarmfort"
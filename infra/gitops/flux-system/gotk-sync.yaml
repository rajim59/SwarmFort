apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: swarmfort-repo
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/rajim59/SwarmFort  # User name updated
  ref:
    branch: main
  secretRef:
    name: swarmfort-auth   # GitHub PAT/SSH key secret

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: swarmfort-stack
  namespace: flux-system
spec:
  interval: 5m
  path: ./infra/gitops/flux-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: swarmfort-repo
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: api
      namespace: default
  timeout: 2m
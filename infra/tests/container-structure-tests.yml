schemaVersion: "2.0.0"
metadataTest:
  envVars:
    - key: PATH
      isRegex: true
      value: '.*\.local/bin.*'
  exposedPorts: ["8000"]
  cmd: ["uvicorn", "src.app:app", "--host", "0.0.0.0", "--port", "8000"]
  workdir: "/app"
  user: "appuser"

fileExistenceTests:
  - name: 'App source directory exists and owned by appuser'
    path: '/app/src'
    shouldExist: true
    uid: 1001
    gid: 1001

commandTests:
  - name: 'Python version'
    command: 'python'
    args: ['--version']
    expectedOutput: ['Python 3\.12']

  - name: 'App user is not root'
    command: 'whoami'
    expectedOutput: ['appuser']
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<filter docker.**>
  @type record_transformer
  <record>
    job docker-logs
  </record>
</filter>

<match docker.**>
  @type loki
  url "http://loki:3100"
  extra_labels {"job":"docker"}
  <label>
    container_name $.container_name
  </label>
  <buffer>
    flush_interval 10s
  </buffer>
</match>
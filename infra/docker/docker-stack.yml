networks:
  frontend-net:
    driver: overlay
    driver_opts:
      encrypted: "true"
    attachable: false
  backend-net:
    driver: overlay
    driver_opts:
      encrypted: "true"
    attachable: false
  database-net:
    driver: overlay
    driver_opts:
      encrypted: "true"
    attachable: false
  monitoring-net:
    driver: overlay
    driver_opts:
      encrypted: "true"

secrets:
  site.crt:
    external: true
  site.key:
    external: true
  db_password:
    external: true
  api_key:
    external: true

configs:
  nginx_conf_v3:
    file: ./nginx.conf
  prometheus_config:
    file: ../monitoring/prometheus/prometheus.yml
  alert_rules:
    file: ../monitoring/prometheus/alert-rules.yml
  loki_config:
    file: ../monitoring/loki/loki-config.yml

services:
  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    networks:
      - frontend-net
      - backend-net
    ports:
      - "80:8080"
      - "443:8443"
    configs:
      - source: nginx_conf_v3
        target: /etc/nginx/conf.d/default.conf
    secrets:
      - site.crt
      - site.key
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == manager
      resources:
        limits: { cpus: "0.50", memory: 128M }
        reservations: { cpus: "0.25", memory: 64M }
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    image: rajim59/swarmfort-api:latest
    networks:
      - backend-net
      - database-net
      - monitoring-net
    environment:
      - DATABASE_URL=postgresql://user:$$(cat /run/secrets/db_password)@db:5432/mydb
      - REDIS_URL=redis:6379
    secrets:
      - db_password
      - api_key
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - tmp_api:/tmp
      - var_run_api:/var/run
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits: { cpus: "1.00", memory: 512M }
        reservations: { cpus: "0.50", memory: 256M }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:15-alpine
    networks:
      - database-net
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: mydb
    secrets:
      - db_password
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits: { cpus: "1.00", memory: 1G }
        reservations: { cpus: "0.50", memory: 512M }
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - database-net
    command: ["sh", "-c", "redis-server --requirepass $$(cat /run/secrets/api_key)"]
    secrets:
      - api_key
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits: { cpus: "0.50", memory: 256M }
        reservations: { cpus: "0.25", memory: 128M }
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/api_key) ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    networks:
      - monitoring-net
    ports:
      - "9090:9090"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: alert_rules
        target: /etc/prometheus/alert-rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - prometheus_data:/prometheus
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits: { memory: 512M }

  grafana:
    image: grafana/grafana:latest
    networks:
      - monitoring-net
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits: { memory: 256M }

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    networks:
      - monitoring-net
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      resources:
        limits: { memory: 256M }

  node-exporter:
    image: prom/node-exporter:latest
    networks:
      - monitoring-net
    ports:
      - "9100:9100"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      resources:
        limits: { memory: 64M }

  loki:
    image: grafana/loki:2.9.3
    networks:
      - monitoring-net
    ports:
      - "3100:3100"
    configs:
      - source: loki_config
        target: /etc/loki/loki-config.yml
    command: -config.file=/etc/loki/loki-config.yml
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - loki_data:/loki
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits: { memory: 256M }

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
  loki_data:
  tmp_api:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  var_run_api:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs









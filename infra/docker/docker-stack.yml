networks:
  frontend-net:
    driver: overlay
    driver_opts:
      encrypted: "true"
    attachable: false
  backend-net:
    driver: overlay
    driver_opts:
      encrypted: "true"
    attachable: false
  database-net:
    driver: overlay
    driver_opts:
      encrypted: "true"
    attachable: false

secrets:
  site.crt:
    external: true
  site.key:
    external: true
  db_password:
    external: true
  api_key:
    external: true

configs:
  nginx_conf:
    file: ./nginx.conf

services:
  nginx:
    image: nginx:alpine
    networks:
      - frontend-net
      - backend-net
    ports:
      - "80:80"
      - "443:443"
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    secrets:
      - site.crt
      - site.key
    deploy:
      replicas: 2
      resources:
        limits: { cpus: "0.50", memory: 128M }
        reservations: { cpus: "0.25", memory: 64M }
      restart_policy:
        condition: any

  api:
    image: hashicorp/http-echo:latest
    command: ["-text=Hello from SwarmFort API", "-listen=:8000"]
    networks:
      - backend-net
      - database-net
    deploy:
      replicas: 3
      resources:
        limits: { cpus: "1.00", memory: 512M }
        reservations: { cpus: "0.50", memory: 256M }

  db:
    image: postgres:15-alpine
    networks:
      - database-net
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: mydb
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits: { cpus: "1.00", memory: 1G }
        reservations: { cpus: "0.50", memory: 512M }
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - database-net
    command: ["sh", "-c", "redis-server --requirepass $$(cat /run/secrets/api_key)"]
    secrets:
      - api_key
    deploy:
      replicas: 1
      resources:
        limits: { cpus: "0.50", memory: 256M }
        reservations: { cpus: "0.25", memory: 128M }
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
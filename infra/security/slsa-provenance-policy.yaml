apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: slsa-provenance-policy
spec:
  images:
    - glob: "myrepo/swarmfort-api:**"
  authorities:
    - keyless:
        identities:
          - issuer: "https://token.actions.githubusercontent.com"
            subjectRegExp: "^https://github.com/your-org/SwarmFort/.github/workflows/release.yml@.*"
      attestations:
        - predicateType: "https://slsa.dev/provenance/v1"
          policy:
            type: cue
            data: |
              predicate.buildType == "https://slsa.dev/container/v1"
              predicate.materials[0].uri =~ "^https://github.com/your-org/SwarmFort"